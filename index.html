<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Libros</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="cabecera">
        <div class="cabecera-contenedor">
            <h1 class="titulo-principal"><i data-lucide="book-open"></i> Buscador de Libros</h1>
            <form id="formulario-busqueda" class="formulario">
                <input type="text" id="input-busqueda" class="input-busqueda" placeholder="Buscar por título, autor..." required>
                <button type="submit" class="btn-buscar"><i data-lucide="search"></i> Buscar</button>
            </form>
        </div>
    </header>

    <main class="contenido-principal">
        <div id="cargador" class="cargador oculto"></div>
        <div id="mensaje" class="mensaje oculto"></div>
        <section id="contenedor-resultados" class="grid-resultados"></section>
    </main>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
